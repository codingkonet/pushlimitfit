name: Build Android APK

on:
  push:
    branches: [master]
  workflow_dispatch:

# Needed so the build can publish the APK to a GitHub Release.
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: client
        run: npm install

      - name: Build web app
        working-directory: client
        env:
          # Optional — set these as repo secrets to bake cloud sync, admin, and
          # PayPal into the APK. If unset, the app builds fine and runs offline
          # (guest mode); PayPal falls back to the free demo unlock.
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_PAYPAL_CLIENT_ID: ${{ secrets.VITE_PAYPAL_CLIENT_ID }}
          VITE_PRO_CURRENCY: ${{ secrets.VITE_PRO_CURRENCY }}
        run: npm run build

      - name: Sync Capacitor Android
        working-directory: client
        run: npx cap sync android

      - name: Make gradlew executable
        working-directory: client/android
        run: chmod +x gradlew

      - name: Build debug APK
        working-directory: client/android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PushLIMITfit-debug-apk
          path: client/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      # Publish to a fixed "android-latest" release so the web app can link to a
      # stable, public download URL that always serves the newest build.
      - name: Stage APK for release
        run: cp client/android/app/build/outputs/apk/debug/app-debug.apk pushlimitfit.apk

      - name: Publish APK to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-latest
          name: PushLIMITfit — latest Android build
          body: Auto-built debug APK from the latest master commit.
          files: pushlimitfit.apk
